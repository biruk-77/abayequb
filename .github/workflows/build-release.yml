name: Build & Release APK

# ─── Triggers ───────────────────────────────────────────────
on:
    push:
        tags:
            - "v*" # Runs when you push a tag like v1.0.0, v1.2.3, etc.
    workflow_dispatch: # Also allows manual trigger from GitHub Actions tab
        inputs:
            release_name:
                description: "Release name (e.g. v1.0.0-beta)"
                required: false
                default: "manual-release"

# ─── Permissions ────────────────────────────────────────────
permissions:
    contents: write # Needed to create GitHub Releases

# ─── Jobs ───────────────────────────────────────────────────
jobs:
    build-and-release:
        name: Build APK & Create Release
        runs-on: ubuntu-latest

        steps:
            # ── 1. Checkout the code ──────────────────────────────
            - name: Checkout repository
              uses: actions/checkout@v4

            # ── 2. Set up Java (required for Android/Gradle) ──────
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            # ── 3. Set up Flutter ─────────────────────────────────
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.29.2" # Update to match your local Flutter version
                  channel: "stable"

            # ── 4. Install dependencies ───────────────────────────
            - name: Install dependencies
              run: flutter pub get

            # ── 5. (Optional) Set up keystore for signed release ──
            #    To use this, add these secrets in your GitHub repo:
            #      KEYSTORE_BASE64   - base64-encoded .jks/.keystore file
            #      KEYSTORE_PASSWORD - keystore password
            #      KEY_ALIAS         - key alias
            #      KEY_PASSWORD      - key password
            - name: Decode keystore
              if: ${{ env.KEYSTORE_BASE64 != '' }}
              env:
                  KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
              run: |
                  echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
                  echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
                  echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
                  echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
                  echo "storeFile=upload-keystore.jks" >> android/key.properties

            # ── 6. Build the release APK ──────────────────────────
            - name: Build release APK
              run: flutter build apk --release

            # ── 7. Rename APK for clarity ─────────────────────────
            - name: Rename APK
              run: |
                  VERSION_TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.release_name }}}"
                  cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/AbayEqub-${VERSION_TAG}.apk"
                  echo "APK_NAME=AbayEqub-${VERSION_TAG}.apk" >> $GITHUB_ENV
                  echo "VERSION_TAG=${VERSION_TAG}" >> $GITHUB_ENV

            # ── 8. Create GitHub Release & upload APK ─────────────
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.VERSION_TAG }}
                  name: "Abay eQub ${{ env.VERSION_TAG }}"
                  body: |
                      ## 🚀 Abay eQub ${{ env.VERSION_TAG }}

                      ### Installation
                      1. Download the APK file below
                      2. Transfer it to your Android device
                      3. Open the APK and install (enable "Install from unknown sources" if prompted)

                      ### What's New
                      - See commit history for changes

                      ---
                      *Built automatically by GitHub Actions*
                  draft: false
                  prerelease: ${{ contains(env.VERSION_TAG, 'beta') || contains(env.VERSION_TAG, 'alpha') }}
                  files: |
                      build/app/outputs/flutter-apk/${{ env.APK_NAME }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
